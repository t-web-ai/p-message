<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P Message - One 2 One</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body>
    <!-- alert box - start -->
    <div
      class="absolute z-1 p-2 flex justify-center left-0 right-0 top-0 h-fit"
      id="alert-box"
    ></div>
    <!-- alert box - end -->

    <!-- home page - start -->
    <div
      class="bg-gray-200 left-0 right-0 top-0 bottom-0 fixed flex justify-center items-center overflow-hidden"
      id="prompt-name-box"
    >
      <div class="flex flex-col items-center">
        <div class="text-2xl font-bold text-black">Web Chat App</div>

        <div class="p-2 flex items-center font-semibold">
          <input
            type="text"
            id="set-name"
            class="bg-white text-black py-2 px-4 rounded-l-full outline-none"
            placeholder="Enter your name"
          />
          <div
            onclick="start()"
            class="py-2 px-4 bg-gray-500 text-white rounded-r-full cursor-pointer"
          >
            Go
          </div>
        </div>
        <div class="text-center text-wrap font-semibold">
          Live messages but no storage
        </div>
        <div class="font-semibold text-red-700">Your privacy matters</div>
      </div>
    </div>
    <!-- home page - end -->

    <!-- message box - start -->
    <div
      class="flex fixed top-0 left-0 right-0 bottom-0 overflow-hidden scroll-smooth hidden"
      id="auth"
    >
      <div
        class="sm:basis-1/3 w-full sm:border-r-2 sm:h-screen sm:border-r-gray-300 bg-gray-100 overflow-y-scroll h-full shrink-0 sm:shrink-1/3"
        id="side-bar"
      >
        <div class="sticky top-0 bg-white p-2">
          <h2 id="username" class="font-semibold truncate text-gray-500">?</h2>
          <h3 class="font-semibold">Who are online?</h3>
        </div>
        <table id="list" class="w-full"></table>
      </div>

      <div
        class="message sm:basis-2/3 flex flex-col h-full w-full justify-between shrink-0 sm:shrink-2/3"
      >
        <div
          class="font-semibold text-center bg-gray-100 p-2 flex justify-between sm:justify-center items-center"
        >
          <div
            class="sm:hidden flex gap-2 cursor-pointer items-center"
            id="back-button"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              fill="currentColor"
              class="bi bi-caret-left-fill"
              viewBox="0 0 16 16"
            >
              <path
                d="m3.86 8.753 5.482 4.796c.646.566 1.658.106 1.658-.753V3.204a1 1 0 0 0-1.659-.753l-5.48 4.796a1 1 0 0 0 0 1.506z"
              />
            </svg>
            <span>Back</span>
          </div>
          <div id="receiver" class="truncate max-w-25">?</div>
        </div>
        <div id="message-box" class="h-full overflow-y-scroll"></div>
        <form class="flex items-center border-t border-gray-300 pr-2">
          <input
            type="text"
            id="input-box"
            placeholder="Text..."
            class="w-full p-2 outline-none font-semibold"
            autocomplete="off"
          />
          <button
            class="w-10 h-10 flex justify-center items-center rounded-full"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              fill="currentColor"
              class="bi bi-send"
              viewBox="0 0 16 16"
            >
              <path
                d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11ZM6.636 10.07l2.761 4.338L14.13 2.576zm6.787-8.201L1.591 6.602l4.339 2.76z"
              />
            </svg>
          </button>
        </form>
      </div>
    </div>
    <!-- message box - end -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/script.js"></script>
  </body>
</html>
